<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siya's Word Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="home-nav">🏠</a>

    <div id="start-overlay" onclick="startApp()">
        <div class="start-content">
            <h1>Ready to Play?</h1>
            <p>TAP TO START! 🎮</p>
        </div>
    </div>

    <div class="app-container">
        <div id="star-container" class="star-display"></div>

        <div class="card">
            <div id="word-slots" class="word-slots-container">
                <div class="slot" id="slot-0">_</div>
                <div class="slot" id="slot-1">_</div>
                <div class="slot" id="slot-2">_</div>
            </div>
            
            <div id="letter-bank" class="letter-bank"></div>
            <div id="feedback-icon" class="feedback-box"></div>
            <p class="tap-hint">Tap letters to build the word!</p>
        </div>

        <div class="controls">
            <button class="nav-btn prev" onclick="prevWord()">⟵</button>
            <button class="nav-btn repeat" onclick="speakWord()">🔊 Repeat</button>
            <button class="nav-btn next" onclick="nextWord()">➔</button>
        </div>
    </div>

    <script src="word.js"></script>
</body>
</html>
