<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siya's Word Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-overlay" onclick="startApp()">
        <div class="start-content">
            <h1>Ready to Play?</h1>
            <p>TAP TO START! 🎮</p>
        </div>
    </div>

    <div class="app-container">
        
        <div id="star-container" class="star-display">
            </div>

        <div id="word-family-indicator" class="family-label">-AR</div>

        <div class="card" onclick="speakWord()">
            <div id="word-text" class="word-letters">
                </div>
            <p class="tap-hint">Tap letters for sounds, Card for word!</p>
        </div>

        <div class="controls">
            <button class="nav-btn prev" onclick="prevWord()" aria-label="Previous Word">⟵</button>
            <button class="nav-btn repeat" onclick="speakWord()" aria-label="Repeat Word">🔊 Repeat</button>
            <button class="nav-btn next" onclick="nextWord()" aria-label="Next Word">➔</button>
        </div>
        
        <div class="footer-hint">
            Keyboard: <b>Left / Right / Space</b>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
