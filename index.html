<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siya's Learning Apps</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 90%;
            max-width: 400px;
        }
        .menu-btn {
            height: 150px;
            font-size: 35px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .menu-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 rgba(0,0,0,0.1); }
        .word-btn { background-color: #8c52ff; } /* Purple */
        .math-btn { background-color: #ff914d; } /* Orange */
        .btn-subtext { font-size: 18px; opacity: 0.9; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1 style="color: #64748b; margin-bottom: 40px;">Hi Siya! 👋</h1>
        
        <div class="menu-container">
            <button class="menu-btn word-btn" onclick="location.href='word.html'">
                <span>🔤 ABC Words</span>
                <span class="btn-subtext">Reading Practice</span>
            </button>

            <button class="menu-btn math-btn" onclick="location.href='math.html'">
                <span>🔢 123 Math</span>
                <span class="btn-subtext">Addition Practice</span>
            </button>
        </div>
    </div>

</body>
</html>
